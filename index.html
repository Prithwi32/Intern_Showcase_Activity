<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Automation Arcade 🎰</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* Arcade Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(255, 0, 100, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 200, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 200, 0, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #0a0015 0%, #1a0030 30%, #0d0d2b 60%, #0a0a1a 100%);
            z-index: -3;
        }

        /* Arcade Floor Grid */
        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: 
                linear-gradient(90deg, rgba(255, 0, 255, 0.05) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            z-index: -2;
        }

        /* Floating Arcade Machines - CSS Art */
        .arcade-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .arcade-machine {
            position: absolute;
            width: 80px;
            height: 140px;
            opacity: 0.12;
        }

        .arcade-machine .screen {
            width: 60px;
            height: 45px;
            margin: 8px auto 5px;
            border-radius: 5px;
            animation: screenFlicker 3s infinite alternate;
        }

        .arcade-machine .body {
            width: 80px;
            height: 140px;
            border-radius: 10px 10px 5px 5px;
            position: absolute;
            top: 0;
        }

        .arcade-machine .joystick {
            width: 8px;
            height: 15px;
            background: #888;
            margin: 5px auto;
            border-radius: 4px;
        }

        .am1 { top: 10%; left: 3%; }
        .am1 .body { background: linear-gradient(180deg, #ff0066, #990033); }
        .am1 .screen { background: linear-gradient(180deg, #00ffcc, #006655); }

        .am2 { top: 30%; right: 2%; }
        .am2 .body { background: linear-gradient(180deg, #6600ff, #330088); }
        .am2 .screen { background: linear-gradient(180deg, #ffcc00, #886600); }

        .am3 { bottom: 20%; left: 5%; }
        .am3 .body { background: linear-gradient(180deg, #0066ff, #003388); }
        .am3 .screen { background: linear-gradient(180deg, #ff3366, #881133); }

        .am4 { top: 55%; right: 4%; }
        .am4 .body { background: linear-gradient(180deg, #00cc66, #006633); }
        .am4 .screen { background: linear-gradient(180deg, #cc66ff, #663388); }

        .am5 { bottom: 5%; right: 8%; }
        .am5 .body { background: linear-gradient(180deg, #ff6600, #883300); }
        .am5 .screen { background: linear-gradient(180deg, #00ccff, #006688); }

        .am6 { top: 5%; right: 15%; }
        .am6 .body { background: linear-gradient(180deg, #ff0099, #660044); }
        .am6 .screen { background: linear-gradient(180deg, #66ff00, #338800); }

        .am7 { bottom: 35%; left: 1%; }
        .am7 .body { background: linear-gradient(180deg, #ffcc00, #886600); }
        .am7 .screen { background: linear-gradient(180deg, #0099ff, #004488); }

        @keyframes screenFlicker {
            0%, 95% { opacity: 1; }
            96% { opacity: 0.4; }
            97% { opacity: 1; }
            98% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* Neon light particles */
        .neon-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear infinite;
            z-index: -1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Slot Machine Header */
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px 20px;
            background: linear-gradient(180deg, rgba(20, 0, 40, 0.95) 0%, rgba(40, 0, 60, 0.9) 100%);
            border-radius: 20px;
            border: 3px solid;
            border-image: linear-gradient(90deg, #ff0066, #ffcc00, #00ffcc, #6600ff, #ff0066) 1;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 30px rgba(255, 0, 102, 0.3),
                0 0 60px rgba(255, 0, 102, 0.1),
                inset 0 0 30px rgba(255, 0, 102, 0.05);
        }

        header::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(90deg, #ff0066, #ffcc00, #00ffcc, #6600ff, #ff0066);
            background-size: 400% 100%;
            border-radius: 22px;
            z-index: -1;
            animation: borderGlow 4s linear infinite;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        /* Marquee lights on header */
        .marquee-lights {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .marquee-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: marqueeChase 1.5s infinite;
        }

        .marquee-light:nth-child(odd) { background: #ff0066; box-shadow: 0 0 10px #ff0066; }
        .marquee-light:nth-child(even) { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        .marquee-light:nth-child(3n) { background: #00ffcc; box-shadow: 0 0 10px #00ffcc; }
        .marquee-light:nth-child(1) { animation-delay: 0s; }
        .marquee-light:nth-child(2) { animation-delay: 0.1s; }
        .marquee-light:nth-child(3) { animation-delay: 0.2s; }
        .marquee-light:nth-child(4) { animation-delay: 0.3s; }
        .marquee-light:nth-child(5) { animation-delay: 0.4s; }
        .marquee-light:nth-child(6) { animation-delay: 0.5s; }
        .marquee-light:nth-child(7) { animation-delay: 0.6s; }
        .marquee-light:nth-child(8) { animation-delay: 0.7s; }
        .marquee-light:nth-child(9) { animation-delay: 0.8s; }
        .marquee-light:nth-child(10) { animation-delay: 0.9s; }
        .marquee-light:nth-child(11) { animation-delay: 1.0s; }
        .marquee-light:nth-child(12) { animation-delay: 1.1s; }

        @keyframes marqueeChase {
            0%, 40% { opacity: 0.2; transform: scale(0.8); }
            20% { opacity: 1; transform: scale(1.3); }
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.8em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff0066, #ffcc00, #00ffcc, #ff0066);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShimmer 3s linear infinite;
            text-shadow: none;
            line-height: 1.4;
        }

        @keyframes textShimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        header > p {
            font-family: 'Orbitron', sans-serif;
            color: #aaa;
            font-size: 0.85em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 18px;
            font-size: 1em;
        }

        .score-item {
            background: linear-gradient(135deg, rgba(255, 0, 102, 0.2), rgba(102, 0, 255, 0.2));
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7em;
            border: 2px solid rgba(255, 204, 0, 0.4);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.1);
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
            color: #ffcc00;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            height: 10px;
            border-radius: 10px;
            margin-top: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        .progress-fill {
            background: linear-gradient(90deg, #ff0066, #ffcc00, #00ffcc);
            background-size: 200% 100%;
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
            animation: progressShimmer 2s linear infinite;
            border-radius: 10px;
        }

        @keyframes progressShimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        /* Dice Section - Slot Machine Style */
        .dice-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 30px;
            background: linear-gradient(180deg, rgba(20, 0, 50, 0.95), rgba(10, 0, 30, 0.98));
            border-radius: 25px;
            border: 3px solid rgba(255, 0, 102, 0.5);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 40px rgba(255, 0, 102, 0.2),
                0 0 80px rgba(102, 0, 255, 0.1),
                inset 0 -5px 30px rgba(0, 0, 0, 0.5);
        }

        /* Slot machine top decoration */
        .dice-section::before {
            content: '★ LUCKY SPIN ★';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 8px;
            background: linear-gradient(90deg, #ff0066, #ffcc00, #ff0066);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6em;
            color: #000;
            letter-spacing: 3px;
        }

        .dice-instruction {
            font-family: 'Press Start 2P', cursive;
            font-size: 1em;
            margin-bottom: 10px;
            margin-top: 20px;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            animation: neonPulse 2s infinite alternate;
        }

        @keyframes neonPulse {
            0% { text-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
            100% { text-shadow: 0 0 30px rgba(255, 204, 0, 0.8), 0 0 60px rgba(255, 204, 0, 0.3); }
        }

        .dice-section > p {
            color: #888;
            font-size: 0.75em;
            letter-spacing: 1px;
        }

        .dice-container {
            display: inline-block;
            margin: 25px;
            position: relative;
        }

        /* Slot machine lever */
        .dice-container::after {
            content: '';
            position: absolute;
            right: -40px;
            top: 20%;
            width: 12px;
            height: 60px;
            background: linear-gradient(180deg, #888, #444);
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .dice-container::before {
            content: '';
            position: absolute;
            right: -46px;
            top: 10%;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #ff0066, #990033);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 0, 102, 0.5);
        }

        .dice {
            width: 140px;
            height: 140px;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            font-weight: bold;
            color: #ffcc00;
            cursor: pointer;
            box-shadow: 
                0 0 30px rgba(255, 0, 102, 0.3),
                0 0 60px rgba(255, 0, 102, 0.1),
                inset 0 0 20px rgba(255, 204, 0, 0.05);
            border: 3px solid rgba(255, 204, 0, 0.4);
            transition: all 0.3s ease;
            position: relative;
            font-family: 'Press Start 2P', cursive;
        }

        .dice:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 0 50px rgba(255, 0, 102, 0.5),
                0 0 100px rgba(255, 0, 102, 0.2),
                inset 0 0 30px rgba(255, 204, 0, 0.1);
            border-color: #ffcc00;
        }

        .dice.rolling {
            animation: slotRoll 0.6s ease-in-out;
        }

        @keyframes slotRoll {
            0% { transform: rotate(0deg) scale(1); border-color: #ffcc00; }
            25% { transform: rotate(15deg) scale(1.1); border-color: #ff0066; box-shadow: 0 0 60px rgba(255, 0, 102, 0.6); }
            50% { transform: rotate(-10deg) scale(0.95); border-color: #00ffcc; box-shadow: 0 0 60px rgba(0, 255, 204, 0.6); }
            75% { transform: rotate(5deg) scale(1.05); border-color: #6600ff; box-shadow: 0 0 60px rgba(102, 0, 255, 0.6); }
            100% { transform: rotate(0deg) scale(1); border-color: #ffcc00; }
        }

        .selected-games {
            margin-top: 20px;
            font-size: 0.85em;
        }

        .game-selector-cards {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .game-selector-card {
            background: linear-gradient(180deg, #1a0030, #0d001a);
            color: #ffcc00;
            padding: 20px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7em;
            font-family: 'Press Start 2P', cursive;
            box-shadow: 
                0 0 20px rgba(255, 0, 102, 0.2),
                inset 0 0 15px rgba(255, 204, 0, 0.05);
            border: 2px solid rgba(255, 0, 102, 0.5);
            transition: all 0.3s ease;
            min-width: 220px;
            text-align: center;
            line-height: 1.6;
            position: relative;
            overflow: hidden;
        }

        .game-selector-card::before {
            content: '🎰';
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 1.2em;
        }

        .game-selector-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 
                0 0 40px rgba(255, 0, 102, 0.4),
                0 0 80px rgba(255, 0, 102, 0.1),
                inset 0 0 20px rgba(255, 204, 0, 0.1);
            border-color: #ffcc00;
            color: #fff;
        }

        .game-selector-card.locked {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.7);
        }

        .game-selector-card.locked:hover {
            transform: none;
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.2);
        }

        /* Games Grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        /* Game Card - Arcade Cabinet Style */
        .game-card {
            background: linear-gradient(180deg, #1a0035 0%, #0d001a 40%, #1a0025 100%);
            border-radius: 20px;
            padding: 30px 25px 25px;
            color: #ddd;
            box-shadow: 
                0 0 30px rgba(255, 0, 102, 0.2),
                0 0 60px rgba(102, 0, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
            border: 2px solid rgba(255, 0, 102, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Scanline effect on game card */
        .game-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
            pointer-events: none;
            z-index: 1;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 0 50px rgba(255, 0, 102, 0.3),
                0 0 100px rgba(102, 0, 255, 0.15);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 0, 102, 0.4);
            position: relative;
            z-index: 2;
        }

        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.85em;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            line-height: 1.5;
        }

        .game-status {
            font-size: 2em;
        }

        /* Timer - Arcade LED Style */
        .game-timer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            border: 1px solid rgba(255, 204, 0, 0.2);
            position: relative;
            z-index: 2;
        }

        .game-timer-container > div:first-child {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6em;
            color: #ffcc00;
        }

        .game-timer {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5em;
            font-weight: bold;
            color: #00ff66;
            background: #000;
            padding: 12px 20px;
            border-radius: 8px;
            min-width: 110px;
            text-align: center;
            border: 2px solid rgba(0, 255, 102, 0.3);
            box-shadow: 
                inset 0 0 20px rgba(0, 255, 102, 0.1),
                0 0 15px rgba(0, 255, 102, 0.2);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        .game-timer.warning {
            color: #ffcc00;
            border-color: rgba(255, 204, 0, 0.5);
            box-shadow: 
                inset 0 0 20px rgba(255, 204, 0, 0.1),
                0 0 15px rgba(255, 204, 0, 0.3);
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
            animation: arcadePulse 0.5s infinite;
        }

        .game-timer.danger {
            color: #ff0066;
            border-color: rgba(255, 0, 102, 0.5);
            box-shadow: 
                inset 0 0 20px rgba(255, 0, 102, 0.1),
                0 0 20px rgba(255, 0, 102, 0.4);
            text-shadow: 0 0 15px rgba(255, 0, 102, 0.7);
            animation: arcadePulse 0.3s infinite;
        }

        @keyframes arcadePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Drop Zones - Arcade Screen Style */
        .drop-zone {
            background: rgba(0, 0, 0, 0.5);
            border: 3px dashed rgba(0, 255, 204, 0.4);
            border-radius: 12px;
            padding: 15px;
            min-height: 120px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            box-shadow: inset 0 0 20px rgba(0, 255, 204, 0.05);
        }

        .drop-zone.drag-over {
            background: rgba(0, 255, 204, 0.1);
            border-color: #00ffcc;
            transform: scale(1.02);
            box-shadow: 
                inset 0 0 30px rgba(0, 255, 204, 0.1),
                0 0 20px rgba(0, 255, 204, 0.2);
        }

        .drop-zone.correct {
            background: rgba(0, 255, 102, 0.15);
            border-color: #00ff66;
            border-style: solid;
            box-shadow: 
                inset 0 0 30px rgba(0, 255, 102, 0.1),
                0 0 30px rgba(0, 255, 102, 0.2);
        }

        .drop-zone.incorrect {
            background: rgba(255, 0, 102, 0.15);
            border-color: #ff0066;
            border-style: solid;
            animation: arcadeShake 0.5s;
            box-shadow: 
                inset 0 0 30px rgba(255, 0, 102, 0.1),
                0 0 30px rgba(255, 0, 102, 0.2);
        }

        @keyframes arcadeShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* Cards Container */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            min-height: 80px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 2;
        }

        /* Draggable Cards - Arcade Token Style */
        .card {
            background: linear-gradient(135deg, #ff0066 0%, #6600ff 50%, #00ccff 100%);
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: move;
            user-select: none;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            box-shadow: 
                0 4px 15px rgba(255, 0, 102, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            display: inline-block;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .card::before {
            content: '◆';
            margin-right: 6px;
            opacity: 0.6;
            font-size: 0.7em;
        }

        .card:hover {
            transform: translateY(-4px) rotate(1deg);
            box-shadow: 
                0 8px 25px rgba(255, 0, 102, 0.4),
                0 0 20px rgba(102, 0, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .card.dragging {
            opacity: 0.5;
            transform: scale(1.05);
        }

        /* Two Column Game */
        .two-column-game {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        .column {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .column-title {
            font-family: 'Press Start 2P', cursive;
            font-weight: bold;

        .column-drop-zone {

        /* Buttons - Arcade Button Style */
        .button-group {
            display: flex;

            padding: 14px 28px;
            border-radius: 50px;
            font-size: 0.65em;
            cursor: pointer;
            transition: all 0.2s ease;

                0 6px 0 #660033,
                0 8px 20px rgba(255, 0, 102, 0.3);

        button:hover {

                0 8px 0 #660033,
                0 12px 30px rgba(255, 0, 102, 0.4);

        button:active {
            transform: translateY(4px);
            box-shadow: 
                0 2px 0 #660033,
                0 4px 10px rgba(255, 0, 102, 0.2);
        }

        button.reset-btn {
            background: linear-gradient(180deg, #6600ff 0%, #5200cc 50%, #3d0099 100%);
            box-shadow: 
                0 6px 0 #2a0066,
                0 8px 20px rgba(102, 0, 255, 0.3);
        }

        button.reset-btn:hover {
            box-shadow: 
                0 8px 0 #2a0066,
                0 12px 30px rgba(102, 0, 255, 0.4);
        }

        button.reset-btn:active {
            box-shadow: 
                0 2px 0 #2a0066,
                0 4px 10px rgba(102, 0, 255, 0.2);
        }

        /* Exit Game Button */
        .exit-game-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(180deg, #ff3366, #cc0044);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55em;
            cursor: pointer;
            box-shadow: 
                0 4px 0 #880033,
                0 6px 15px rgba(255, 0, 102, 0.3);
            z-index: 100;
        }

        .exit-game-btn:hover {
            transform: translateY(-2px);
        }

        .exit-game-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #880033;
        }

        /* Feedback */
        .feedback {
            text-align: center;
            margin-top: 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.65em;
            font-weight: bold;
            min-height: 30px;
            padding: 10px;
            border-radius: 10px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            line-height: 1.6;
        }

        .feedback.success {
            background: rgba(0, 255, 102, 0.15);
            color: #00ff66;
            border: 1px solid rgba(0, 255, 102, 0.3);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }

        .feedback.error {
            background: rgba(255, 0, 102, 0.15);
            color: #ff3366;
            border: 1px solid rgba(255, 0, 102, 0.3);
            text-shadow: 0 0 10px rgba(255, 0, 102, 0.5);
        }

        /* Zone Label */
        .zone-label {
            font-size: 0.75em;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            position: relative;
            z-index: 2;
        }

        .sequence-zone {
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        /* Celebration - Jackpot Style */
        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(180deg, #1a0035, #0d001a);
            color: white;
            padding: 50px 70px;
            border-radius: 25px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2em;

            box-shadow: 
                0 0 60px rgba(255, 204, 0, 0.5),
                0 0 120px rgba(255, 0, 102, 0.3),
                inset 0 0 40px rgba(255, 204, 0, 0.05);
            border: 3px solid #ffcc00;
            z-index: 1000;
            animation: jackpotPop 0.6s ease;
            display: none;
            text-align: center;
            line-height: 2;
        }

        .celebration.show {
            display: block;
        }

        @keyframes jackpotPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); }
            50% { transform: translate(-50%, -50%) scale(1.15) rotate(3deg); }
            70% { transform: translate(-50%, -50%) scale(0.95) rotate(-1deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
        }

        /* Global Controls */
        .global-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;

        .global-controls button {
            font-size: 0.7em;

        /* Question Modal - Arcade Popup */
        .question-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;

        .question-modal.show {
            display: flex;

        .question-content {
            background: linear-gradient(180deg, #1a0035, #0d001a);

            padding: 40px;
            border-radius: 25px;
            max-width: 700px;
            width: 90%;

                0 0 60px rgba(255, 0, 102, 0.3),

            border: 3px solid rgba(255, 0, 102, 0.5);
            animation: modalSlideIn 0.3s ease;

        @keyframes modalSlideIn {
            from { transform: translateY(-50px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 204, 0, 0.3);

        .option-btn:hover {

        }

        .option-btn.correct {

        }

        .option-btn.incorrect {
            background: rgba(255, 0, 102, 0.2);
            color: #ff3366;
            border-color: #ff3366;
            animation: arcadeShake 0.5s;
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.2);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .question-feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: bold;
            text-align: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6em;
            line-height: 1.6;
        }

        .next-question-btn {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            font-size: 0.7em;
        }

        .games-grid.hidden {
            display: none;
        }

        /* Coin slot decoration */
        .coin-slot {
            display: inline-block;
            width: 40px;
            height: 6px;
            background: linear-gradient(180deg, #333, #111);
            border-radius: 3px;
            margin: 10px auto;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
        }

        /* Neon sign effect for section titles */
        .neon-text {
            color: #fff;
            text-shadow:
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #ff0066,
                0 0 82px #ff0066,
                0 0 92px #ff0066;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1em; }
            .games-grid { grid-template-columns: 1fr; }
            .two-column-game { grid-template-columns: 1fr; }
            .score-board { flex-direction: column; gap: 10px; }
            .celebration { font-size: 0.8em; padding: 30px 40px; }
            .game-title { font-size: 0.65em; }
            .dice { width: 110px; height: 110px; font-size: 3em; }
            .game-selector-card { min-width: 160px; font-size: 0.55em; }
        }

        /* Pixel art coin animation */
        .pixel-coin {
            display: inline-block;
            animation: coinSpin 1s linear infinite;
        }

        @keyframes coinSpin {
            0% { transform: scaleX(1); }
            25% { transform: scaleX(0.3); }
            50% { transform: scaleX(1); }
            75% { transform: scaleX(0.3); }
            100% { transform: scaleX(1); }
        }

        /* Jackpot lights around celebration */
        .celebration::before {
            content: '🎰 JACKPOT 🎰';
            display: block;
            font-size: 0.6em;
            color: #ffcc00;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.8);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0015;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff0066, #6600ff);
            border-radius: 4px;
        }

        .game-card > p {
            color: #888;
            font-size: 0.8em;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

            <button class="next-question-btn" id="nextQuestionBtn" onclick="nextQuestion()" style="display: none;">NEXT QUESTION →</button>

    <script>
        // Create floating neon particles
        function createParticles() {
            const colors = ['#ff0066', '#ffcc00', '#00ffcc', '#6600ff', '#ff6600', '#00ff66'];
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'neon-particle';
                const size = Math.random() * 4 + 2;
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    background: ${color};
                    box-shadow: 0 0 ${size * 3}px ${color};
                    left: ${Math.random() * 100}%;
                    animation-duration: ${Math.random() * 8 + 6}s;
                    animation-delay: ${Math.random() * 5}s;
                `;
                document.body.appendChild(particle);
            }
        }
        createParticles();

        // Play arcade sound effect (visual feedback since we can't play audio without user gesture)
        function flashScreen(color = 'rgba(255, 204, 0, 0.1)') {
            const flash = document.createElement('div');
            flash.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: ${color}; z-index: 9999; pointer-events: none;
                animation: flashFade 0.3s ease forwards;
            `;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 300);
        }

        // Add flash animation
        const flashStyle = document.createElement('style');
        flashStyle.textContent = `
            @keyframes flashFade {
                0% { opacity: 1; }
                100% { opacity: 0; }
            }
        `;
        document.head.appendChild(flashStyle);

        // Game Data Configuration
        const gameData = {
            1: {
                type: 'sequence',
                title: '1️⃣ AI WORKFLOW SEQUENCE',
                cards: ['Input', 'OCR', 'Rule Engine', 'AI Decision', 'RPA Action', 'Notification'],
                correctOrder: ['Input', 'OCR', 'Rule Engine', 'AI Decision', 'RPA Action', 'Notification']
            },
            2: {
                type: 'categorize',
                title: '2️⃣ TRADITIONAL vs INTELLIGENT',
                cards: [
                    { text: 'Rule-Based Processing', category: 'traditional' },
                    { text: 'Predefined Workflows', category: 'traditional' },
                    { text: 'Machine Learning Models', category: 'intelligent' },
                    { text: 'Natural Language Processing', category: 'intelligent' },
                    { text: 'Static Decision Trees', category: 'traditional' },
                    { text: 'Computer Vision/OCR', category: 'intelligent' },
                    { text: 'Predictive Analytics', category: 'intelligent' },
                    { text: 'Fixed If-Then Logic', category: 'traditional' }
                ]
            },
            3: {
                type: 'sequence',
                title: '3️⃣ GENAI REQUEST LIFECYCLE',
                cards: ['User Prompt', 'Prompt Engineering', 'LLM Processing', 'Response Generation', 'Post-Processing', 'Logging & Telemetry'],
                correctOrder: ['User Prompt', 'Prompt Engineering', 'LLM Processing', 'Response Generation', 'Post-Processing', 'Logging & Telemetry']
            },
            4: {
                type: 'sequence',
                title: '4️⃣ AI FAILURE HANDLING',
                cards: ['AI Prediction', 'Confidence Check', 'Human Review Queue', 'Manual Decision', 'Feedback Loop', 'Model Retraining'],
                correctOrder: ['AI Prediction', 'Confidence Check', 'Human Review Queue', 'Manual Decision', 'Feedback Loop', 'Model Retraining']
            },
            5: {
                type: 'sequence',
                title: '5️⃣ GENAI READINESS PRIORITY',
                cards: ['Data Quality', 'Automation', 'AI Model', 'UI'],
                correctOrder: ['Data Quality', 'Automation', 'AI Model', 'UI']
            }
        };

        let gameState = {
            1: { completed: false, correct: false },
            2: { completed: false, correct: false },
            3: { completed: false, correct: false },
            4: { completed: false, correct: false },
            5: { completed: false, correct: false }
        };

        let selectedGames = [];
        let currentGameNumber = null;
        let gameTimer = null;
        let gameTimeRemaining = 60;
        let totalScore = 0;

        window.addEventListener('DOMContentLoaded', () => {
            setupDropZones();
        });

        function rollDice() {
            if (selectedGames && selectedGames.length > 0) {
                const selectedText = document.getElementById('selectedGamesText');
                if (selectedText) {
                    const prev = selectedText.innerHTML;
                    selectedText.innerHTML = '<p style="color:#ffcc00; font-family: Press Start 2P; font-size: 0.7em;">⚠️ GAMES ALREADY SELECTED — USE "NEW GAME"</p>';
                    setTimeout(() => selectedText.innerHTML = prev, 1400);
                }
                return;
            }

            const dice = document.getElementById('dice');
            const diceNumber = document.getElementById('diceNumber');
            
            dice.classList.add('rolling');
            flashScreen('rgba(255, 0, 102, 0.15)');
            
            let counter = 0;
            const symbols = ['🎰', '7️⃣', '🍒', '💎', '⭐', '🎯'];
            const rollInterval = setInterval(() => {
                diceNumber.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                counter++;
                if (counter > 15) {
                    clearInterval(rollInterval);
                    const finalNumber = Math.floor(Math.random() * 6);
                    diceNumber.textContent = finalNumber;
                    dice.classList.remove('rolling');
                    flashScreen('rgba(255, 204, 0, 0.2)');
                    selectRandomGames(finalNumber);
                }
            }, 80);
        }

        function selectRandomGames(count) {
            if (count === 0) {
                document.getElementById('selectedGamesText').innerHTML = 
                    '<p style="color: #ff3366; font-family: Press Start 2P; font-size: 0.7em;">🎰 ZERO! SPIN AGAIN!</p>';
                document.getElementById('gameSelectorCards').innerHTML = '';
                const newBtn = document.getElementById('newGameBtn');
                if (newBtn) newBtn.style.display = 'none';
                const backBtn0 = document.getElementById('globalBackBtn');
                if (backBtn0) backBtn0.style.display = 'inline-block';
                return;
            }

            const allGameNumbers = [1, 2, 3, 4, 5];
            selectedGames = [];
            const shuffled = allGameNumbers.sort(() => Math.random() - 0.5);
            selectedGames = shuffled.slice(0, count);
            selectedGames.sort((a, b) => a - b);

            document.getElementById('selectedGamesText').innerHTML = 
                `<p style="color: #00ff66; font-family: Press Start 2P; font-size: 0.7em;">🎰 JACKPOT ${count}! SELECT A GAME:</p>`;

            const container = document.getElementById('gameSelectorCards');
            container.innerHTML = '';
            
            selectedGames.forEach(gameNum => {
                const card = document.createElement('div');
                card.className = 'game-selector-card';
                card.textContent = gameData[gameNum].title;
                card.onclick = () => startGame(gameNum);
                container.appendChild(card);
            });

            const newBtn = document.getElementById('newGameBtn');
            if (newBtn) newBtn.style.display = 'inline-block';
            const backBtn = document.getElementById('globalBackBtn');
            if (backBtn) backBtn.style.display = 'none';
        }

        function startGame(gameNum) {
            currentGameNumber = gameNum;
            flashScreen('rgba(0, 255, 204, 0.15)');
            
            document.getElementById('diceSection').style.display = 'none';
            document.getElementById('gamesGrid').style.display = 'grid';

            const gamesGrid = document.getElementById('gamesGrid');
            gamesGrid.innerHTML = '';
            
            const gameCard = createGameCard(gameNum);
            gamesGrid.appendChild(gameCard);

            initializeGame(gameNum);
            startGameTimer();

            const backBtn = document.getElementById('globalBackBtn');
            const newBtn = document.getElementById('newGameBtn');
            if (backBtn) {
                backBtn.textContent = '🎰 BACK TO LOBBY';
                backBtn.style.display = 'inline-block';
            }
            if (newBtn) newBtn.style.display = 'none';
        }

        function globalBackAction() {
            const backBtn = document.getElementById('globalBackBtn');
            const diceSection = document.getElementById('diceSection');

            if (currentGameNumber) {
                showRolledPage();
                return;
            }

            if (diceSection && diceSection.style.display !== 'none') {
                if (!selectedGames || selectedGames.length === 0) {
                    rollDice();
                    if (backBtn) backBtn.textContent = '🎰 BACK TO LOBBY';
                    return;
                }

                const selectedText = document.getElementById('selectedGamesText');
                if (selectedText) {
                    const prev = selectedText.innerHTML;
                    selectedText.innerHTML = '<p style="color:#ffcc00; font-family: Press Start 2P; font-size: 0.7em;">⚠️ USE "NEW GAME" TO RESET</p>';
                    setTimeout(() => selectedText.innerHTML = prev, 1400);
                }
                return;
            }

            backToDice();
        }

        function createGameCard(gameNum) {
            const game = gameData[gameNum];
            const card = document.createElement('div');
            card.className = 'game-card';
            card.style.gridColumn = '1 / -1';
            
            let dropZoneHTML = '';
            
            if (game.type === 'sequence') {
                dropZoneHTML = `
                    <div class="sequence-zone">
                        <div class="zone-label">▶ DRAG CARDS HERE IN ORDER:</div>
                        <div class="drop-zone" id="game${gameNum}-drop" data-game="${gameNum}"></div>
                    </div>
                `;
            } else if (game.type === 'categorize') {
                dropZoneHTML = `
                    <div class="two-column-game">
                        <div class="column">
                            <div class="column-title">📋 TRADITIONAL AUTOMATION</div>
                            <div class="column-drop-zone" id="game${gameNum}-drop-traditional" data-game="${gameNum}" data-category="traditional"></div>
                        </div>
                        <div class="column">
                            <div class="column-title">🧠 INTELLIGENT AUTOMATION</div>
                            <div class="column-drop-zone" id="game${gameNum}-drop-intelligent" data-game="${gameNum}" data-category="intelligent"></div>
                        </div>
                    </div>
                `;
            }

            card.innerHTML = `
                <button class="exit-game-btn" onclick="exitGame()">✕ EXIT</button>
                <div class="game-header">
                    <div class="game-title">${game.title}</div>
                    <div class="game-status" id="game${gameNum}-status"></div>
                </div>
                
                <div class="game-timer-container">
                    <div>⏱️ TIME:</div>
                    <div class="game-timer" id="gameTimer">60s</div>
                </div>
                
                <p style="margin-bottom: 15px;">Complete the challenge before time runs out!</p>
                
                <div class="cards-container" id="game${gameNum}-cards"></div>
                
                ${dropZoneHTML}

                <div class="button-group">
                    <button onclick="checkAnswer(${gameNum})">✓ CHECK</button>
                    <button class="reset-btn" onclick="resetGame(${gameNum})">↻ RESET</button>
                </div>
                <div class="feedback" id="game${gameNum}-feedback"></div>
            `;

            return card;
        }

        function initializeGame(gameNum) {
            const game = gameData[gameNum];
            const container = document.getElementById(`game${gameNum}-cards`);
            container.innerHTML = '';

            if (game.type === 'sequence') {
                const shuffled = [...game.cards].sort(() => Math.random() - 0.5);
                shuffled.forEach((cardText, index) => {
                    const card = createCard(cardText, gameNum, index);
                    container.appendChild(card);
                });
            } else if (game.type === 'categorize') {
                const shuffled = [...game.cards].sort(() => Math.random() - 0.5);
                shuffled.forEach((cardData, index) => {
                    const card = createCard(cardData.text, gameNum, index, cardData.category);
                    container.appendChild(card);
                });
            }

            gameState[gameNum] = { completed: false, correct: false };
            document.getElementById(`game${gameNum}-status`).textContent = '';
            document.getElementById(`game${gameNum}-feedback`).textContent = '';
            document.getElementById(`game${gameNum}-feedback`).className = 'feedback';

            if (game.type === 'sequence') {
                document.getElementById(`game${gameNum}-drop`).innerHTML = '';
                document.getElementById(`game${gameNum}-drop`).className = 'drop-zone';
            } else if (game.type === 'categorize') {
                document.getElementById(`game${gameNum}-drop-traditional`).innerHTML = '';
                document.getElementById(`game${gameNum}-drop-intelligent`).innerHTML = '';
            }

            setupDropZones();
        }

        function createCard(text, gameNum, index, category = null) {
            const card = document.createElement('div');
            card.className = 'card';
            card.draggable = true;
            card.textContent = text;
            card.dataset.game = gameNum;
            card.dataset.text = text;
            if (category) card.dataset.category = category;

            card.addEventListener('dragstart', handleDragStart);
            card.addEventListener('dragend', handleDragEnd);

            return card;
        }

        let draggedElement = null;

        function handleDragStart(e) {
            draggedElement = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', e.target.innerHTML);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragEnter(e) {
            if (e.target.classList.contains('drop-zone') || e.target.classList.contains('column-drop-zone') || e.target.classList.contains('cards-container')) {
                e.target.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            if (e.target.classList.contains('drop-zone') || e.target.classList.contains('column-drop-zone') || e.target.classList.contains('cards-container')) {
                e.target.classList.remove('drag-over');
            }
        }

        function handleDrop(e) {
            e.stopPropagation();
            e.target.classList.remove('drag-over');

            if (draggedElement && (e.target.classList.contains('drop-zone') || 
                e.target.classList.contains('column-drop-zone') || 
                e.target.classList.contains('cards-container'))) {
                
                const clone = draggedElement.cloneNode(true);
                clone.addEventListener('dragstart', handleDragStart);
                clone.addEventListener('dragend', handleDragEnd);
                
                e.target.appendChild(clone);
                draggedElement.remove();
            }

            return false;
        }

        function setupDropZones() {
            const dropZones = document.querySelectorAll('.drop-zone, .column-drop-zone, .cards-container');
            dropZones.forEach(zone => {
                zone.addEventListener('dragover', handleDragOver);
                zone.addEventListener('dragenter', handleDragEnter);
                zone.addEventListener('dragleave', handleDragLeave);
                zone.addEventListener('drop', handleDrop);
            });
        }

        function checkAnswer(gameNum) {
            const game = gameData[gameNum];
            const feedback = document.getElementById(`game${gameNum}-feedback`);
            let isCorrect = false;

            if (game.type === 'sequence') {
                const dropZone = document.getElementById(`game${gameNum}-drop`);
                const cards = Array.from(dropZone.querySelectorAll('.card'));
                const userOrder = cards.map(card => card.dataset.text);

                isCorrect = JSON.stringify(userOrder) === JSON.stringify(game.correctOrder);

                if (isCorrect) {
                    dropZone.classList.add('correct');
                    dropZone.classList.remove('incorrect');
                    feedback.className = 'feedback success';
                    document.getElementById(`game${gameNum}-status`).textContent = '✅';
                    stopGameTimer();
                    flashScreen('rgba(0, 255, 102, 0.2)');
                    
                    const timeBonus = gameTimeRemaining * 2;
                    const pointsEarned = 100 + timeBonus;
                    totalScore += pointsEarned;
                    feedback.textContent = `✅ PERFECT! +${pointsEarned} PTS (${timeBonus} TIME BONUS)`;
                    
                    gameState[gameNum].completed = true;
                    gameState[gameNum].correct = true;
                    updateScore();
                    
                    setTimeout(() => checkGameCompletion(), 1500);
                } else {
                    dropZone.classList.add('incorrect');
                    dropZone.classList.remove('correct');
                    feedback.textContent = '❌ WRONG ORDER! TRY AGAIN!';
                    feedback.className = 'feedback error';
                    document.getElementById(`game${gameNum}-status`).textContent = '❌';
                    flashScreen('rgba(255, 0, 102, 0.15)');
                }
            } else if (game.type === 'categorize') {
                const traditionalZone = document.getElementById(`game${gameNum}-drop-traditional`);
                const intelligentZone = document.getElementById(`game${gameNum}-drop-intelligent`);

                const traditionalCards = Array.from(traditionalZone.querySelectorAll('.card'));
                const intelligentCards = Array.from(intelligentZone.querySelectorAll('.card'));

                const traditionalCorrect = traditionalCards.every(card => card.dataset.category === 'traditional');
                const intelligentCorrect = intelligentCards.every(card => card.dataset.category === 'intelligent');
                const allPlaced = traditionalCards.length + intelligentCards.length === game.cards.length;

                isCorrect = traditionalCorrect && intelligentCorrect && allPlaced;

                if (isCorrect) {
                    feedback.className = 'feedback success';
                    document.getElementById(`game${gameNum}-status`).textContent = '✅';
                    stopGameTimer();
                    flashScreen('rgba(0, 255, 102, 0.2)');
                    
                    const timeBonus = gameTimeRemaining * 2;
                    const pointsEarned = 100 + timeBonus;
                    totalScore += pointsEarned;
                    feedback.textContent = `✅ EXCELLENT! +${pointsEarned} PTS (${timeBonus} TIME BONUS)`;
                    
                    gameState[gameNum].completed = true;
                    gameState[gameNum].correct = true;
                    updateScore();
                    
                    setTimeout(() => checkGameCompletion(), 1500);
                } else {
                    feedback.textContent = '❌ WRONG CATEGORIES! TRY AGAIN!';
                    feedback.className = 'feedback error';
                    document.getElementById(`game${gameNum}-status`).textContent = '❌';
                    flashScreen('rgba(255, 0, 102, 0.15)');
                }
            }
        }

        function checkGameCompletion() {
            const allSelectedCompleted = selectedGames.every(num => gameState[num].completed);
            
            if (allSelectedCompleted) {
                setTimeout(() => showCelebration(), 500);
            } else {
                showRolledPage();
            }
        }

        function resetGame(gameNum) {
            const game = gameData[gameNum];
            const container = document.getElementById(`game${gameNum}-cards`);
            container.innerHTML = '';

            if (game.type === 'sequence') {
                const shuffled = [...game.cards].sort(() => Math.random() - 0.5);
                shuffled.forEach((cardText, index) => {
                    const card = createCard(cardText, gameNum, index);
                    container.appendChild(card);
                });
                const drop = document.getElementById(`game${gameNum}-drop`);
                if (drop) { drop.innerHTML = ''; drop.className = 'drop-zone'; }
            } else if (game.type === 'categorize') {
                const shuffled = [...game.cards].sort(() => Math.random() - 0.5);
                shuffled.forEach((cardData, index) => {
                    const card = createCard(cardData.text, gameNum, index, cardData.category);
                    container.appendChild(card);
                });
                const trad = document.getElementById(`game${gameNum}-drop-traditional`);
                const intel = document.getElementById(`game${gameNum}-drop-intelligent`);
                if (trad) trad.innerHTML = '';
                if (intel) intel.innerHTML = '';
            }

            const feedback = document.getElementById(`game${gameNum}-feedback`);
            if (feedback) { feedback.textContent = ''; feedback.className = 'feedback'; }
            const status = document.getElementById(`game${gameNum}-status`);
            if (status) status.textContent = '';

            setupDropZones();
        }

        function exitGame() {
            stopGameTimer();
            showRolledPage();
        }

        function backToDice() {
            stopGameTimer();
            document.getElementById('diceSection').style.display = 'block';
            document.getElementById('gamesGrid').style.display = 'none';
            document.getElementById('gamesGrid').innerHTML = '';

            const diceNumber = document.getElementById('diceNumber');
            if (diceNumber) diceNumber.textContent = '🎰';
            const selectedText = document.getElementById('selectedGamesText');
            if (selectedText) selectedText.innerHTML = '';
            const selector = document.getElementById('gameSelectorCards');
            if (selector) selector.innerHTML = '';

            selectedGames = [];
            updateScore();
            currentGameNumber = null;

            const backBtn = document.getElementById('globalBackBtn');
            const newBtn = document.getElementById('newGameBtn');
            if (backBtn) { backBtn.textContent = '🎰 SPIN'; backBtn.style.display = 'inline-block'; }
            if (newBtn) newBtn.style.display = 'none';
        }

        function showRolledPage() {
            stopGameTimer();
            document.getElementById('diceSection').style.display = 'block';
            document.getElementById('gamesGrid').style.display = 'none';

            const diceNumber = document.getElementById('diceNumber');
            if (diceNumber && diceNumber.textContent === '') diceNumber.textContent = '🎰';

            const container = document.getElementById('gameSelectorCards');
            const selectedText = document.getElementById('selectedGamesText');
            container.innerHTML = '';
            if (selectedGames && selectedGames.length > 0) {
                const completedCount = selectedGames.filter(num => gameState[num].completed).length;
                const remainingCount = selectedGames.length - completedCount;
                selectedText.innerHTML = `<p style="color: #00ff66; font-family: Press Start 2P; font-size: 0.65em;">${completedCount}/${selectedGames.length} COMPLETE. ${remainingCount > 0 ? 'CHOOSE NEXT GAME:' : 'ALL DONE!'}</p>`;
                selectedGames.forEach(gameNum => {
                    const card = document.createElement('div');
                    card.className = 'game-selector-card';
                    if (gameState[gameNum].completed) {
                        card.classList.add('locked');
                        card.textContent = gameData[gameNum].title + ' ✅';
                    } else {
                        card.textContent = gameData[gameNum].title;
                        card.onclick = () => startGame(gameNum);
                    }
                    container.appendChild(card);
                });
                const newBtn = document.getElementById('newGameBtn');
                if (newBtn) newBtn.style.display = 'inline-block';
            } else {
                selectedText.innerHTML = `<p style="color: #ffcc00; font-family: Press Start 2P; font-size: 0.65em;">🎰 SPIN TO SELECT GAMES!</p>`;
                const newBtn = document.getElementById('newGameBtn');
                if (newBtn) newBtn.style.display = 'none';
            }

            const backBtn = document.getElementById('globalBackBtn');
            const newBtn = document.getElementById('newGameBtn');
            if (backBtn) { backBtn.textContent = '🎰 SPIN'; backBtn.style.display = 'none'; }
            if (newBtn && selectedGames && selectedGames.length > 0) newBtn.style.display = 'inline-block';

            currentGameNumber = null;
        }

        function newGame() {
            selectedGames = [];
            totalScore = 0;

            for (let i = 1; i <= 5; i++) {
                gameState[i] = { completed: false, correct: false };
            }

            const diceNumber = document.getElementById('diceNumber');
            if (diceNumber) diceNumber.textContent = '🎰';
            const selectedText = document.getElementById('selectedGamesText');
            if (selectedText) selectedText.innerHTML = '<p style="color: #ffcc00; font-family: Press Start 2P; font-size: 0.65em;">🎰 SPIN TO SELECT GAMES!</p>';
            const selector = document.getElementById('gameSelectorCards');
            if (selector) selector.innerHTML = '';

            updateScore();

            const backBtn = document.getElementById('globalBackBtn');
            const newBtn = document.getElementById('newGameBtn');
            if (backBtn) { backBtn.textContent = '🎰 SPIN'; backBtn.style.display = 'inline-block'; }
            if (newBtn) newBtn.style.display = 'none';

            document.getElementById('diceSection').style.display = 'block';
            document.getElementById('gamesGrid').style.display = 'none';
            document.getElementById('gamesGrid').innerHTML = '';

            currentGameNumber = null;
        }

        function startGameTimer() {
            gameTimeRemaining = 60;
            updateGameTimer();
            gameTimer = setInterval(() => {
                gameTimeRemaining--;
                updateGameTimer();
                if (gameTimeRemaining <= 0) {
                    stopGameTimer();
                    gameTimeUp();
                }
            }, 1000);
        }

        function stopGameTimer() {
            if (gameTimer) { clearInterval(gameTimer); gameTimer = null; }
        }

        function updateGameTimer() {
            const timerElement = document.getElementById('gameTimer');
            if (timerElement) {
                timerElement.textContent = `${gameTimeRemaining}s`;
                timerElement.className = 'game-timer';
                if (gameTimeRemaining <= 10) timerElement.classList.add('danger');
                else if (gameTimeRemaining <= 20) timerElement.classList.add('warning');
            }
        }

        function gameTimeUp() {
            if (currentGameNumber) {
                const feedback = document.getElementById(`game${currentGameNumber}-feedback`);
                feedback.textContent = '⏰ TIME\'S UP! TRY AGAIN!';
                feedback.className = 'feedback error';
                flashScreen('rgba(255, 0, 102, 0.2)');
            }
        }

        function updateScore() {
            let completedCount = 0;
            selectedGames.forEach(num => { if (gameState[num].completed) completedCount++; });

            document.getElementById('totalScore').textContent = totalScore;
            document.getElementById('completedGames').textContent = completedCount;
            document.getElementById('totalGames').textContent = selectedGames.length;
            
            const progress = selectedGames.length > 0 ? (completedCount / selectedGames.length) * 100 : 0;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        function showCelebration() {
            flashScreen('rgba(255, 204, 0, 0.3)');
            const celebration = document.getElementById('celebration');
            celebration.innerHTML = `
                🎉 JACKPOT! 🎉<br>
                ALL ${selectedGames.length} GAMES COMPLETE!<br>
                <span style="font-size: 0.6em; color: #ffcc00;">TOTAL SCORE: ${totalScore} PTS</span>
            `;
            celebration.classList.add('show');
            
            setTimeout(() => {
                celebration.classList.remove('show');
                totalScore = 0;
                selectedGames.forEach(num => {
                    gameState[num].completed = false;
                    gameState[num].correct = false;
                });
                updateScore();
                backToDice();
            }, 4000);
        }
    </script>
</body>
</html>
